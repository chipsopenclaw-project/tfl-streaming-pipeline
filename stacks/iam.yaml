AWSTemplateFormatVersion: "2010-09-09"
Description: "TfL Streaming Pipeline - IAM Roles"

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, staging, prod]

Resources:

  # ── Lambda Role ───────────────────────────────────────────────────────────
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tfl-${Environment}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: KinesisWritePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:PutRecord
                  - kinesis:PutRecords
                Resource: !Sub "arn:aws:kinesis:eu-west-2:${AWS::AccountId}:stream/tfl-${Environment}-euw2-kinesis-tube-arrivals"
        - PolicyName: SQSConsumePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !Sub "arn:aws:sqs:eu-west-2:${AWS::AccountId}:tfl-${Environment}-euw2-sqs-tfl-fetcher"
        - PolicyName: CloudWatchLogsPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  # ── Firehose Role ─────────────────────────────────────────────────────────
  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tfl-${Environment}-firehose-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3BronzeWritePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-bronze"
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-bronze/*"
        - PolicyName: KinesisReadPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListShards
                Resource: !Sub "arn:aws:kinesis:eu-west-2:${AWS::AccountId}:stream/tfl-${Environment}-euw2-kinesis-tube-arrivals"

  # ── Glue Role ─────────────────────────────────────────────────────────────
  GlueRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tfl-${Environment}-glue-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: glue.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSGlueServiceRole
      Policies:
        - PolicyName: S3MedallionPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-bronze"
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-bronze/*"
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-silver"
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-silver/*"
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-gold"
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-gold/*"
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-glue-scripts"
                  - !Sub "arn:aws:s3:::tfl-${Environment}-euw2-s3-glue-scripts/*"
        - PolicyName: KinesisReadPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - kinesis:GetRecords
                  - kinesis:GetShardIterator
                  - kinesis:DescribeStream
                  - kinesis:ListShards
                Resource: !Sub "arn:aws:kinesis:eu-west-2:${AWS::AccountId}:stream/tfl-${Environment}-euw2-kinesis-tube-arrivals"

  # ── EventBridge Scheduler Role ────────────────────────────────────────────
  SchedulerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tfl-${Environment}-scheduler-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSSendMessagePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sqs:SendMessage
                Resource: !Sub "arn:aws:sqs:eu-west-2:${AWS::AccountId}:tfl-${Environment}-euw2-sqs-tfl-fetcher"

  # ── EventBridge Pipe Role ─────────────────────────────────────────────────
  PipeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "tfl-${Environment}-pipe-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: pipes.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: SQSReadPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !Sub "arn:aws:sqs:eu-west-2:${AWS::AccountId}:tfl-${Environment}-euw2-sqs-tfl-fetcher"
        - PolicyName: LambdaInvokePolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:eu-west-2:${AWS::AccountId}:function:tfl-${Environment}-euw2-lambda-tfl-fetcher"

Outputs:
  LambdaRoleArn:
    Value: !GetAtt LambdaRole.Arn
    Export:
      Name: !Sub "tfl-${Environment}-lambda-role-arn"

  FirehoseRoleArn:
    Value: !GetAtt FirehoseRole.Arn
    Export:
      Name: !Sub "tfl-${Environment}-firehose-role-arn"

  GlueRoleArn:
    Value: !GetAtt GlueRole.Arn
    Export:
      Name: !Sub "tfl-${Environment}-glue-role-arn"

  SchedulerRoleArn:
    Value: !GetAtt SchedulerRole.Arn
    Export:
      Name: !Sub "tfl-${Environment}-scheduler-role-arn"

  PipeRoleArn:
    Value: !GetAtt PipeRole.Arn
    Export:
      Name: !Sub "tfl-${Environment}-pipe-role-arn"
